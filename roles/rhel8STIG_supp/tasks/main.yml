# V-230371
- name: stigrule_230371__Get all passwd entries
  ansible.builtin.getent:
    database: passwd
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Init user_uid_list
  ansible.builtin.set_fact:
    user_uid_list: []
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Build list of (user, uid) for normal users
  ansible.builtin.set_fact:
    user_uid_list: "{{ user_uid_list + [{'name': item.key, 'uid': (item.value[1] | int)}] }}"
  loop: "{{ ansible_facts.getent_passwd | dict2items }}"
  when:
    - rhel8STIG_stigrule_230371_Manage
    - item.value is sequence
    - item.value | length > 2
    - (item.value[1] | int) >= rhel8STIG_stigrule_230371_min_uid

- name: stigrule_230371__Build list of UIDs
  ansible.builtin.set_fact:
    uid_list: "{{ user_uid_list | map(attribute='uid') | list }}"
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Build map of uid -> count
  ansible.builtin.set_fact:
    uid_counts: "{{ uid_counts | default({}) | combine({item: (uid_counts[item] | default(0)) + 1}) }}"
  loop: "{{ uid_list }}"
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Build list of duplicate UIDs
  ansible.builtin.set_fact:
    dup_uids: >-
      {{
        uid_counts
        | dict2items
        | selectattr('value', '>', 1)
        | map(attribute='key')
        | list
      }}
  when:
    - rhel8STIG_stigrule_230371_Manage
    - uid_counts is defined
    - uid_counts | length > 0

- name: stigrule_230371__Show duplicate UIDs
  ansible.builtin.debug:
    msg: "Duplicate UID {{ item }} has users: {{
            user_uid_list
            | selectattr('uid', 'equalto', item)
            | map(attribute='name')
            | list
          }}"
  loop: "{{ dup_uids }}"
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Build set of used UIDs
  ansible.builtin.set_fact:
    used_uids: "{{ uid_list | unique | sort }}"
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Init list of users needing UID change
  ansible.builtin.set_fact:
    uid_changes: []
  when: rhel8STIG_stigrule_230371_Manage

- name: stigrule_230371__Add users needing UID change
  ansible.builtin.set_fact:
    uid_changes: "{{ uid_changes + [{'name': item.name, 'old_uid': item.uid}] }}"
  loop: "{{ user_uid_list }}"
  when:
    - rhel8STIG_stigrule_230371_Manage
    - item.uid in dup_uids
    - item.name != (
        user_uid_list
        | selectattr('uid', 'equalto', item.uid)
        | map(attribute='name')
        | list
        | first
      )

- name: stigrule_230371__Compute free UIDs
  ansible.builtin.set_fact:
    free_uids: >-
      {{
        range(rhel8STIG_stigrule_230371_min_uid, rhel8STIG_stigrule_230371_max_uid + 1)
        | difference(used_uids)
        | list
      }}
  when:
    - rhel8STIG_stigrule_230371_Manage
    - uid_changes | length > 0

- name: stigrule_230371__Zip uid_changes with free_uids
  ansible.builtin.set_fact:
    uid_changes_zipped: "{{ uid_changes | zip(free_uids) | list }}"
  when:
    - rhel8STIG_stigrule_230371_Manage
    - uid_changes | length > 0

- name: stigrule_230371__Build final uid_changes list with new_uid
  ansible.builtin.set_fact:
    uid_changes_with_new: "{{ uid_changes_with_new | default([]) + [ item.0 | combine({'new_uid': item.1}) ] }}"
  loop: "{{ uid_changes_zipped }}"
  when:
    - rhel8STIG_stigrule_230371_Manage
    - uid_changes_zipped is defined and uid_changes_zipped | length > 0

- name: stigrule_230371__Change UID in /etc/passwd for each user
  ansible.builtin.lineinfile:
    path: /etc/passwd
    regexp: '^{{ item.name }}:'
    line: >-
      {{ item.name }}:x:{{ item.new_uid }}:{{ ansible_facts.getent_passwd[item.name][2] }}:{{ ansible_facts.getent_passwd[item.name][3] }}:{{ ansible_facts.getent_passwd[item.name][4] }}:{{ ansible_facts.getent_passwd[item.name][5] }}
  loop: "{{ uid_changes_with_new }}"
  when:
    - rhel8STIG_stigrule_230371_Manage
    - uid_changes_with_new is defined and uid_changes_with_new | length > 0

# V-230372
- name: stigrule_230372__pam_cert_auth
  community.general.ini_file:
    exclusive: true
    owner: root
    group: root
    mode: '0600'
    ignore_spaces: true
    section: pam
    option: pam_cert_auth
    value: true
    path: /etc/sssd/sssd.conf
    state: present
  when: rhel8STIG_stigrule_230372_Manage
  notify: sssd_restart

- name: Add 'try_cert_auth' hint to smartcard-auth in 'sssd' authselect profile
  ansible.builtin.replace:
    path: /usr/share/authselect/default/sssd/smartcard-auth
    regexp: >-
      ^(auth\s+sufficient\s+pam_sss\.so\s+allow_missing_name\s+\{if "with-smartcard-required":require_cert_auth\})(?!.*\{if "with-smartcard" and \(not "with-smartcard-required"\):try_cert_auth\})
    replace: >-
      \1{if "with-smartcard" and (not "with-smartcard-required"):try_cert_auth}
    # backup: true

- name: stigrule_230372__config_smartcard-auth
  community.general.pamd:
    name: smartcard-auth
    type: auth
    control: sufficient
    module_path: pam_sss.so
    module_arguments: 'allow_missing_name try_cert_auth'
    state: updated
    new_type: auth
    new_control: sufficient
    new_module_path: pam_sss.so
  when:
    - rhel8STIG_stigrule_230372_Manage
  notify: sssd_restart

- name: stigrule_230372__config_system-auth
  community.general.pamd:
    name: system-auth
    type: auth
    control: '[success=done authinfo_unavail=ignore user_unknown=ignore ignore=ignore default=die]'
    module_path: pam_sss.so
    module_arguments: try_cert_auth
    state: updated
    new_type: auth
    new_control: '[success=done authinfo_unavail=ignore user_unknown=ignore ignore=ignore default=die]'
    new_module_path: pam_sss.so
  when: rhel8STIG_stigrule_230372_Manage
  notify: sssd_restart

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

