- name: stigrule_230513__tmp_variable
  ansible.builtin.set_fact:
    tmp_mount: >-
      {{
        ansible_mounts
        | selectattr('mount', 'equalto', '/tmp')
        | list
        | first
      }}
  when: rhel8STIG_stigrule_230513_Manage

- name: stigrule_230513_noexec
  ansible.posix.mount:
    path: /tmp
    src: "{{ tmp_mount.device }}"
    fstype: "{{ tmp_mount.fstype }}"
    opts: "{{ (tmp_mount.options.split(',') + ['noexec']) | unique | join(',') }}"
    state: mounted
    # backup: true
  when: rhel8STIG_stigrule_230513_Manage

