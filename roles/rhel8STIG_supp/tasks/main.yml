          | list
          | first
          | default({}) }}
    current_seuser: "{{ existing.seuser | default('') }}"
    current_range: "{{ existing.range | default('') }}"
    have_mapping: "{{ existing != {} }}"
  when:
    - rhel8STIG_stigrule_254520_Manage
    - rhel8STIG_stigrule_254520_staff_u_selinux_users | length > 0
    - current_seuser != target_seuser
      or current_range != desired_range

- name: stigrule_254520__set_specified users to the user_u SELinux user # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: >-
      semanage login
      {{ have_mapping | ternary('-m', '-a') }}
      -s {{ target_seuser }}
