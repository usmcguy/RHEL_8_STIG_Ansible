# V-230237 RHEL-08-010160
- name: stigrule_230237__ensure_sha512_for_pam_unix_in_password_auth
  ansible.builtin.lineinfile:
    path: /etc/pam.d/password-auth
    # Match any pam_unix.so password line (commented or not, any control flag)
    regexp: '^[#\s]*password\s+\w+\s+pam_unix\.so.*$'
    # Enforce the STIG-required line
    line: 'password    sufficient    pam_unix.so sha512'
    backrefs: false
    create: false
  when: rhel8STIG_stigrule_230237_Manage

