# V-230504
- name: stigrule_230504__ensure_firewalld_present
  ansible.builtin.dnf:
    name: firewalld
    state: present
  when: rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__ensure_python-firewall_present
  ansible.builtin.dnf:
    name: python3-firewall
    state: present
  when: rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__ensure_firewalld_running
  ansible.builtin.service:
    name: firewalld
    state: started
  when: rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__get_active_zones
  ansible.posix.firewalld_info:
    active_zones: true
  register: active_zones
  when:
    - rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__set_default_zone_fact
  ansible.builtin.set_fact:
    default_zone: "{{ active_zones.firewalld_info.default_zone }}"
  when:
    - rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__get_detailed_zone_info
  ansible.posix.firewalld_info:
    zones: "{{ default_zone }}"
  register: zone_details
  when:
    - rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__create_custom_zone
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    state: present
    permanent: true
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__set_custom_zone_shortname
  ansible.builtin.lineinfile:
    path: /etc/firewalld/zones/{{ rhel8STIG_stigrule_230504_customZone }}.xml
    regexp: '^(\s*)<short>.*</short>'
    line: "  <short>{{ rhel8STIG_stigrule_230504_customZone }}</short>"
    insertafter: '<zone'
    state: present
    # backup: true
  when: rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__set_custom_zone_description
  ansible.builtin.lineinfile:
    path: /etc/firewalld/zones/{{ rhel8STIG_stigrule_230504_customZone }}.xml
    regexp: '^(\s*)<description>.*</description>'
    line: "  <description>{{ rhel8STIG_stigrule_230504_zoneDesc }}</description>"
    insertafter: '<short>'
    state: present
    # backup: true
  when: rhel8STIG_stigrule_230504_Manage

- name: stigrule_230504__set_zone_drop_target
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    state: present
    permanent: true
    target: DROP
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__set_allowed_services
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    service: "{{ item }}"
    state: enabled
    permanent: true
  loop: "{{ rhel8STIG_stigrule_230504_allowed_services }}"
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__set_allowed_ports
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    port: "{{ item }}"
    state: enabled
    permanent: true
  loop: "{{ rhel8STIG_stigrule_230504_allowed_ports }}"
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__set_icmp_blocks
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    icmp_block: "{{ item }}"
    state: enabled
    permanent: true
  loop: "{{ rhel8STIG_stigrule_230504_icmp_blocks }}"
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__assign_interfaces_to_custom_zone
  ansible.posix.firewalld:
    zone: "{{ rhel8STIG_stigrule_230504_customZone }}"
    interface: "{{ item }}"
    state: enabled
    permanent: true
  loop: "{{ ansible_interfaces | difference(['lo']) }}"
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__set_custom_zone_as_default
  ansible.builtin.command: firewall-cmd --set-default-zone={{ rhel8STIG_stigrule_230504_customZone }}
  register: set_default_zone
  changed_when: '"ZONE_ALREADY_SET" not in set_default_zone.stderr'
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

- name: stigrule_230504__reload_firewalld
  ansible.builtin.service:
    name: firewalld
    state: reloaded
  when:
    - rhel8STIG_stigrule_230504_Manage
    - zone_details.firewalld_info.zones[default_zone].target != 'DROP'

