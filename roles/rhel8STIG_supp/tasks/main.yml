# V-272482
- name: stigrule_272482__set_MACs_openssh_policy_txt
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^MACs.*'
    line: 'MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com,hmac-sha2-512,hmac-sha2-256'
    state: present
  loop:
    - /usr/share/crypto-policies/FIPS/openssh.txt
    - /usr/share/crypto-policies/back-ends/FIPS/openssh.config
    - /etc/crypto-policies/back-ends/openssh.config
  when: rhel8STIG_stigrule_272482_Manage
  notify: ssh_restart

# V-272483
- name: stigrule_272483__set_ciphers_openssh_policy
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^Ciphers.*'
    line: 'Ciphers aes256-gcm@openssh.com,aes128-gcm@openssh.com,aes256-ctr,aes128-ctr'
    state: present
  loop:
    - /usr/share/crypto-policies/FIPS/openssh.txt
    - /usr/share/crypto-policies/back-ends/FIPS/openssh.config
    - /etc/crypto-policies/back-ends/openssh.config
  when: rhel8STIG_stigrule_272483_Manage
  notify: ssh_restart

# V-272484
- name: stigrule_272484__Ensure_type_sysadm_t_present_on_etc_sudoers_lines
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    backrefs: true
    regexp: '^(?!#)(?!root\b)(?!%wheel\b)(.*ALL=\(ALL[^)]*\))\s+(?!.*\bTYPE=sysadm_t\b)(.*)$'
    line: '\1 TYPE=sysadm_t \2'
    validate: 'visudo -cf %s'
  when:
    - rhel8STIG_stigrule_272484_Manage

- name: stigrule_272484__Ensure_role_sysadm_r_present_on_etc_sudoers_lines
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    backrefs: true
    regexp: '^(?!#)(?!root\b)(?!%wheel\b)(.*ALL=\(ALL[^)]*\)(?:\s+TYPE=sysadm_t)?)\s+(?!.*\bROLE=sysadm_r\b)(.*)$'
    line: '\1 ROLE=sysadm_r \2'
    validate: 'visudo -cf %s'
  when:
    - rhel8STIG_stigrule_272484_Manage

- name: stigrule_272484__Find sudoers.d files
  ansible.builtin.find:
    paths: /etc/sudoers.d
    file_type: file
    patterns: '*'
  register: sudoers_d_files
  when: rhel8STIG_stigrule_272484_Manage

- name: stigrule_272484__Ensure_type_sysadm_t_present_on_etc_sudoers.d_lines
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    backrefs: true
    regexp: '^(?!#)(?!root\b)(?!%wheel\b)(.*ALL=\(ALL[^)]*\))\s+(?!.*\bTYPE=sysadm_t\b)(.*)$'
    line: '\1 TYPE=sysadm_t \2'
    validate: 'visudo -cf %s'
  loop: "{{ sudoers_d_files.files }}"
  when:
    - rhel8STIG_stigrule_272484_Manage
    - sudoers_d_files.matched | int > 0
    - item.path not in rhel8STIG_stigrule_272484_ignore_files

- name: stigrule_272484__Ensure_role_sysadm_r_present_on_etc_sudoers.d_lines
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    backrefs: true
    regexp: '^(?!#)(?!root\b)(?!%wheel\b)(.*ALL=\(ALL[^)]*\)(?:\s+TYPE=sysadm_t)?)\s+(?!.*\bROLE=sysadm_r\b)(.*)$'
    line: '\1 ROLE=sysadm_r \2'
    validate: 'visudo -cf %s'
  loop: "{{ sudoers_d_files.files }}"
  when:
    - rhel8STIG_stigrule_272484_Manage
    - sudoers_d_files.matched | int > 0
    - item.path not in rhel8STIG_stigrule_272484_ignore_files
