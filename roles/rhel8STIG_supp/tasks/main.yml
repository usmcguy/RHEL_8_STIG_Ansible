    sys_grp_args: '\( {{ sys_grp_args_raw }} \)'
  when:
    - rhel8STIG_stigrule_251709_Manage

- name: stigrule_251709__verify_root_or_sys_account_group_owns_libraries
  ansible.builtin.shell: find /lib /lib64 /usr/lib /usr/lib64 {{ rhel8STIG_stigrule_251709_exclude_cmd }} {{ sys_grp_args }} -type d ! -xtype l -exec ls -ald {} + -exec chgrp {{ rhel8STIG_stigrule_251709_chgrp_acct }} {} +;
  register: libs_grp
  changed_when: libs_grp.stdout_lines | length > 0
  when: rhel8STIG_stigrule_251709_Manage

# V-251710
- name: stigrule_251710__aide_present
  ansible.builtin.package:
    name: aide
    state: present
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__read_aide.conf
  ansible.builtin.slurp:
    path: /etc/aide.conf
  register: aide_conf_raw
  no_log: true
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__Extract relevant lines from aide.conf
  ansible.builtin.set_fact:
    aide_conf_text: "{{ aide_conf_raw.content | b64decode }}"
  no_log: true
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__set_line_vars
  ansible.builtin.set_fact:
    aide_dbdir_line: >-
      {{ aide_conf_text
        | regex_search('^[ \\t]*@@define[ \\t]+DBDIR[ \\t]+.*$', multiline=True)
        | default('', true) }}
    aide_database_line: >-
      {{ aide_conf_text
        | regex_search('^[ \\t]*database=file:.*$', multiline=True)
        | default('', true) }}
    aide_database_out_line: >-
      {{ aide_conf_text
        | regex_search('^[ \\t]*database_out=file:.*$', multiline=True)
        | default('', true) }}
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__extract_vars_from_lines
  ansible.builtin.set_fact:
    aide_dbdir: >-
      {{ aide_dbdir_line
        | regex_replace('^[ \\t]*@@define[ \\t]+DBDIR[ \\t]+', '')
        | regex_replace('[ \\t#].*$', '') }}
    aide_database: >-
      {{ aide_database_line
        | regex_replace('^[ \\t]*database=file:', '')
        | regex_replace('[ \\t#].*$', '') }}
    aide_database_out: >-
      {{ aide_database_out_line
        | regex_replace('^[ \\t]*database_out=file:', '')
        | regex_replace('[ \\t#].*$', '') }}
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__expand_DBDIR_in_paths
  ansible.builtin.set_fact:
    aide_database_path: >-
      {{ aide_database | regex_replace('@@{DBDIR}', aide_dbdir) }}
    aide_database_out_path: >-
      {{ aide_database_out | regex_replace('@@{DBDIR}', aide_dbdir) }}
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__stat_db_file
  ansible.builtin.stat:
    path: "{{ aide_database_path }}"
    get_checksum: false
    get_mime: false
  register: aide_db_stat
  when:
    - rhel8STIG_stigrule_251710_Manage

- name: stigrule_251710__aide_check
  ansible.builtin.command: /usr/sbin/aide --check
  register: aide_check_output
  failed_when: aide_check_output.rc not in [0,1,2,3,4,5,6,7]
  async: 1800
  poll: 30
  changed_when: false
  no_log: true
  when:
    - rhel8STIG_stigrule_251710_Manage
    - aide_db_stat.stat.exists

- name: stigrule_251710__aide_initialize
  ansible.builtin.command: /usr/sbin/aide --init
  async: 1800
  poll: 30
  register: aide_out
  changed_when: "'AIDE initialized database' in aide_out.stdout"
  when:
    - rhel8STIG_stigrule_251710_Manage
    - (aide_check_output.stderr | length > 0) or (not aide_db_stat.stat.exists)

- name: stigrule_251710__aide_update_db
  ansible.builtin.command: /usr/sbin/aide --update
  async: 1800
  poll: 30
  register: aide_update_out
  changed_when: "'New AIDE database written' in aide_update_out.stdout"
  failed_when: aide_update_out.rc not in [0,1,2,3,4,5,6,7]
  no_log: true
  when:
    - rhel8STIG_stigrule_251710_Manage
    - "'AIDE found differences' in aide_check_output.stdout"

- name: stigrule_251710__rename_AIDE_db
  ansible.builtin.command: mv -f /var/lib/aide/aide.db.new.gz /var/lib/aide/aide.db.gz
  #  creates: /var/lib/aide/aide.db.gz
  changed_when: aide_move.rc == 0
  register: aide_move
  when:
    - rhel8STIG_stigrule_251710_Manage
    - aide_out.changed or aide_update_out.changed

# V-251711
- name: stigrule_251711__includedir_present
  ansible.builtin.lineinfile:
    path: /etc/sudoers
    regexp: '^#includedir'
    line: '#includedir /etc/sudoers.d'
    state: present
  when: rhel8STIG_stigrule_251711_Manage

- name: stigrule_251711_grep_sudoers
  ansible.builtin.shell: |
    set -o pipefail
    grep -rl '^include' /etc/sudoers.d || true
  register: sudoers_include
  changed_when: false
  when: rhel8STIG_stigrule_251711_Manage

- name: stigrule_251711__remove_include
  ansible.builtin.lineinfile:
    path: "{{ item }}"
    regexp: '^(include.*)$'
    state: absent
  loop: "{{ sudoers_include.stdout_lines }}"
  when:
    - rhel8STIG_stigrule_251711_Manage
    - sudoers_include.stdout_lines | length > 0

# V-251712
- name: stigrule_251712__remove_pam_succeed_if_sudo
  ansible.builtin.lineinfile:
    path: /etc/pam.d/sudo
    regexp: '.*pam_succeed_if.*'
    state: absent
  when: rhel8STIG_stigrule_251712_Manage

# V-251713
- name: stigrule_251713__account_rule
  ansible.builtin.shell: |
    set -o pipefail
    grep '^account' /etc/pam.d/system-auth | tail -n 1 | awk '{ for (i = 1; i <= 3 && i <= NF; i++) print $i }'
  register: account_rule
  changed_when: false
  when: rhel8STIG_stigrule_251713_Manage

- name: stigrule_251713__ensure_pam_pwquality.so_present
  community.general.pamd:
    name: system-auth
    type: "{{ account_rule.stdout_lines[0] }}"
    control: "{{ account_rule.stdout_lines[1] }}"
    module_path: "{{ account_rule.stdout_lines[2] }}"
    new_type: password
    new_control: requisite
    new_module_path: pam_pwquality.so
    module_arguments: 'local_users_only'
    state: after
    # backup: true
  when:
    - rhel8STIG_stigrule_251713_Manage
    - account_rule.stdout is defined
    - account_rule.stdout | length > 0

# V-251716
- name: stigrule_251716__remove_retries
  ansible.builtin.replace:
    path: /etc/pam.d/system-auth
    regexp: '(\[.*\s?)retry=\d+(\s?.*\])'
    replace: '\1\2'
  when: rhel8STIG_stigrule_251716_Manage

- name: stigrule_251716__remove_retries
  ansible.builtin.replace:
    path: /etc/pam.d/password-auth
    regexp: '(\[.*\s?)retry=\d+(\s?.*\])'
    replace: '\1\2'
  when: rhel8STIG_stigrule_251716_Manage

- name: stigrule_251716__set_pwquality
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    line: 'retry = 3'
    state: present
    regexp: '^retry'
  when: rhel8STIG_stigrule_251716_Manage

# V-254520
- name: stigrule_254520__enable SSH logins for sysadm_u
  ansible.posix.seboolean:
    name: ssh_sysadm_login
    state: true
    persistent: true
  when: rhel8STIG_stigrule_254520_Manage

- name: stigrule_254520__get_selinux_logins
  ansible.builtin.command:
    cmd: semanage login -l -n
  register: semanage_login_raw
  changed_when: false
  when: rhel8STIG_stigrule_254520_Manage

- name: stigrule_254520__build_login_dictionary
  ansible.builtin.set_fact:
    selinux_login_map: >-
      {{
        (selinux_login_map | default([]))
        + [ {
              'login':  (item.split()[0]),
              'seuser': (item.split()[1] | default('')),
              'range':  (item.split()[2] | default(''))
            } ]
      }}
  loop: "{{ semanage_login_lines }}"
  vars:
    semanage_login_lines: >-
      {{ semanage_login_raw.stdout_lines
          | reject('search', 'Login Name')
          | reject('search', '^[- ]+$')
          | list }}
  when: rhel8STIG_stigrule_254520_Manage

- name: stigrule_254520__set_specified users to the sysadm_u SELinux user # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: >-
      semanage login
      {{ have_mapping | ternary('-m', '-a') }}
      -s {{ target_seuser }}
      -r {{ desired_range }}
      {{ desired_login }}
  loop: "{{ rhel8STIG_stigrule_254520_sysadm_u_selinux_users }}"
  loop_control:
    label: "{{ desired_login }}"
  register: sysadm_result
  changed_when: sysadm_result.rc == 0
  vars:
    target_seuser: sysadm_u
    desired_login: >-
      {{ item.user if (item is mapping) else item }}
    desired_range: >-
      {{ (item.mcs_range if (item is mapping and 'mcs_range' in item)
          else 's0-s0:c0.c1023') }}
    existing: >-
      {{ selinux_login_map
          | selectattr('login', 'equalto', desired_login)
          | list
          | first
          | default({}) }}
    current_seuser: "{{ existing.seuser | default('') }}"
    current_range: "{{ existing.range | default('') }}"
    have_mapping: "{{ existing != {} }}"
  when:
    - rhel8STIG_stigrule_254520_Manage
    - rhel8STIG_stigrule_254520_sysadm_u_selinux_users | length > 0
    - current_seuser != target_seuser
      or current_range != desired_range

- name: stigrule_254520__set_specified users to the staff_u SELinux user # noqa: command-instead-of-shell
  ansible.builtin.shell:
    cmd: >-
      semanage login
      {{ have_mapping | ternary('-m', '-a') }}
      -s {{ target_seuser }}
      -r {{ desired_range }}
      {{ desired_login }}
  loop: "{{ rhel8STIG_stigrule_254520_staff_u_selinux_users }}"
  loop_control:
