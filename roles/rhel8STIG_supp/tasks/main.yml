# V-230264 RHEL-08-010370
- name: stigrule_230264__stat_conf_files
  ansible.builtin.stat:
    path: "{{ item }}"
    get_checksum: false
    get_mime: false
    follow: true
  loop:
    - /etc/yum.conf
    - /etc/dnf/dnf.conf
  register: main_conf_stats
  when: rhel8STIG_stigrule_230264_Manage

- name: stigrule_230264__gpgcheck_main_conf_files
  community.general.ini_file:
    path: "{{ item.item }}"
    section: main
    option: gpgcheck
    value: 1
    ignore_spaces: true
    exclusive: true
    follow: true
    mode: '0644'
    owner: root
    group: root
  loop: "{{ main_conf_stats.results }}"
  when:
    - rhel8STIG_stigrule_230264_Manage
    - item.stat.exists

- name: stigrule_230264__find_repo_files
  ansible.builtin.find:
    paths: /etc/yum.repos.d
    patterns: "*.repo"
    file_type: file
  register: repo_files
  when: rhel8STIG_stigrule_230264_Manage

- name: stigrule_230264__get_repo_sections
  ansible.builtin.command: >
    awk -F'[][]' '/^\s*\[.*\]\s*$/ {print $2}' {{ item.path }}
  register: repo_sections_cmd
  loop: "{{ repo_files.files }}"
  changed_when: false
  when:
    - rhel8STIG_stigrule_230264_Manage
    - repo_files.files | length > 0

- name: Build list of {path, section} dicts
  ansible.builtin.set_fact:
    repo_path_section_dicts: "{{ repo_path_section_dicts | default([]) + new_pairs }}"
  vars:
    new_pairs: >-
      {{
        item.stdout_lines
        | map('community.general.dict_kv', 'section')
        | map('combine', {'path': item.item.path})
        | list
      }}
  loop: "{{ repo_sections_cmd.results }}"
  loop_control:
    label: "{{ item.item.path }}"
  when:
    - rhel8STIG_stigrule_230264_Manage
    - repo_sections_cmd.results | length > 0

- name: stigrule_230264__gpgcheck_main_conf_files
  community.general.ini_file:
    path: "{{ item.path }}"
    section: "{{ item.section }}"
    option: gpgcheck
    value: 1
    ignore_spaces: true
    exclusive: true
    follow: true
    mode: '0644'
    owner: root
    group: root
  loop: "{{ repo_path_section_dicts }}"
  when:
    - rhel8STIG_stigrule_230264_Manage
    - repo_path_section_dicts is defined

