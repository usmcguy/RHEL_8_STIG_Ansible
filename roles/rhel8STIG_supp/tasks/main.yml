- name: Reset Connection to reset user context
  ansible.builtin.meta: reset_connection

- name: stigrule_254520__set the default SELinux user on the system
  community.general.selogin:
    login: __default__
    seuser: "{{ rhel8STIG_stigrule_254520_default_selinux_users.seuser }}"
    selevel: "{{ rhel8STIG_stigrule_254520_default_selinux_users.mcs_range }}"
    state: present
  when:
    - rhel8STIG_stigrule_254520_Manage
    - rhel8STIG_stigrule_254520_set_default_user_context

