# V-230301 RHEL-08-010580
- name: stigrule_230301__backup_fstab
  ansible.builtin.copy:
    src: /etc/fstab
    dest: /etc/fstab.bak_stigrule_230301
    remote_src: true
    owner: root
    group: root
    mode: '0600'
  when: rhel8STIG_stigrule_230301_Manage

- name: stigrule_230301__get_fstab_entries_missing_nodev
  ansible.builtin.shell:
    cmd: >
      awk '
        /^\s*#/ { next }
        /^\s*$/ { next }
        {
          dev=$1; mnt=$2; fstype=$3; opts=$4;
          if (mnt == "none") next;
          if (mnt == "/") next;
          if (fstype == "swap") next;
          split("{{ rhel8STIG_stigrule_230301_exclude_fstypes | join(' ') }}", exfs, " ");
          for (f in exfs) if (fstype == exfs[f]) next;
          split("{{ rhel8STIG_stigrule_230301_exclude_mounts | join(' ') }}", exmnt, " ");
          for (m in exmnt) if (mnt == exmnt[m]) next;
          n=split(opts, o, ",");
          found=0;
          for (i=1; i<=n; i++) if (o[i] == "nodev") found=1;
          if (!found) print mnt;
        }
      ' /etc/fstab
    executable: /bin/bash
  register: rhel8STIG_stigrule_230301_mounts_missing_nodev
  changed_when: false
  when: rhel8STIG_stigrule_230301_Manage

- name: stigrule_230301__set_fact_mounts_missing_nodev
  ansible.builtin.set_fact:
    rhel8STIG_stigrule_230301_target_mounts: >-
      {{
        rhel8STIG_stigrule_230301_mounts_missing_nodev.stdout_lines
        | select('length')
        | list
      }}
  when: rhel8STIG_stigrule_230301_Manage

- name: stigrule_230301__add_nodev_to_fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(\S+\s+{{ item | regex_escape }}\s+\S+\s+)((?!(?:\S*,)?nodev(?:,|\s))\S+)(\s+\d+\s+\d+.*)$'
    replace: '\1\2,nodev\3'
  loop: "{{ rhel8STIG_stigrule_230301_target_mounts | default([]) }}"
  when:
    - rhel8STIG_stigrule_230301_Manage
    - (rhel8STIG_stigrule_230301_target_mounts | default([]) | length) > 0
  register: rhel8STIG_stigrule_230301_fstab_changes

- name: stigrule_230301__remount_partitions_with_nodev # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "mount -o remount {{ item }}"
  loop: "{{ rhel8STIG_stigrule_230301_target_mounts | default([]) }}"
  when:
    - rhel8STIG_stigrule_230301_Manage
    - (rhel8STIG_stigrule_230301_target_mounts | default([]) | length) > 0
  register: remount_result
  changed_when: remount_result.rc == 0

